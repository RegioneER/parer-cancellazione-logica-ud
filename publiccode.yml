description:
  it:
    features:
      - archiviazione documentale
    longDescription: |
      Microservizio per l'implementazione della "cancellazione logica" (soft delete) delle Unità Documentarie (UD) e dell'intera gerarchia di entità collegate. Il processo prevede la registrazione asincrona delle richieste di cancellazione logica (multi–tipologia), minimizzare la latenza tra richiesta e primo item elaborato (pipeline sovrapposta), garantire coerenza relazionale multi‑livello mediante algoritmo BFS ottimizzato e batch query, supportare modalità di elaborazione CAMPIONE e COMPLETA (bottom‑up sulle relazioni), ecc..
    shortDescription: |-
      Microservizio per l'implementazione della "cancellazione logica" (soft delete) delle Unità Documentarie (UD).
